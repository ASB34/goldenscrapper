name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            asb34/goldenscrapper:latest
            asb34/goldenscrapper:${{ github.sha }}
          cache-from: type=registry,ref=asb34/goldenscrapper:buildcache
          cache-to: type=registry,ref=asb34/goldenscrapper:buildcache,mode=max

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Image pushed to Docker Hub"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/goldenupload:latest"
          echo "Manual: Pull image and restart container in Portainer"
