name: Build & Push Docker Image

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: asb34/goldenscrapper

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      # Fallback tag in case metadata fails
      - name: Set fallback tags
        if: steps.meta.outputs.tags == ''
        run: echo "TAGS=latest,${{ github.sha }}" >> $GITHUB_OUTPUT
        id: fallback

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags || steps.fallback.outputs.TAGS || 'latest' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build status notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Docker image built and pushed successfully!"
            echo ""
            echo "📦 Image details:"
            echo "  Registry: ${{ env.REGISTRY }}"
            echo "  Repository: ${{ env.IMAGE_NAME }}"
            echo ""
            echo "🏷️  Tags:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
            echo ""
            echo "🚀 Pull in Portainer:"
            echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo ""
            echo "📋 Portainer Stack Configuration:"
            echo "  image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          else
            echo "❌ Build failed!"
            echo "Check GitHub Actions logs for details"
            exit 1
          fi
